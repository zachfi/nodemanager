# This is an example .goreleaser.yml file with some sensible defaults.
# Make sure to check the documentation at https://goreleaser.com
version: 2
before:
  hooks:
    # You may remove this if you don't use go modules.
    - go mod tidy
    # you may remove this if you don't need go generate
    - go generate ./...
builds:
  - id: nodemanager
    ldflags:
      - -X main.version={{.Version}}
      - -X main.gitCommit={{.Commit}}
      - -X main.buildDate={{.Date}}
      - -X main.goos={{.Os}}
      - -X main.goarch={{.Arch}}
    env:
      - CGO_ENABLED=0
      # - 'CC={{ index .Env (print "CC_" .Os "_" .Arch) }}'
      # - 'CXX={{ index .Env (print "CXX_" .Os "_" .Arch) }}'
    goarm:
      - '7'
    goamd64:
      - 'v1'
      # - 'v2'
      # - 'v3'
      # - 'v4'
    goos:
      - linux
      - freebsd
    goarch:
      - amd64
      - arm
      - arm64
    ignore:
      - goos: freebsd
        goarch: arm
        goarm: 7
    main: './cmd/'
  - id: nodemanager-agent
    binary: nodemanager-agent
    ldflags:
      - -X main.version={{.Version}}
      - -X main.gitCommit={{.Commit}}
      - -X main.buildDate={{.Date}}
      - -X main.goos={{.Os}}
      - -X main.goarch={{.Arch}}
    env:
      - CGO_ENABLED=0
    goarm:
      - '7'
    goamd64:
      - 'v1'
    goos:
      - linux
    goarch:
      - amd64
      - arm
      - arm64
    main: './cmd/agent/'
checksum:
  name_template: 'checksums.txt'
snapshot:
  version_template: '{{ incpatch .Version }}-next'
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
archives:
  - id: nodemanager
    builds:
      - nodemanager
    files:
      - config/crd/bases/*.yaml
  - id: nodemanager-agent
    builds:
      - nodemanager-agent
    name_template: "nodemanager-agent_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}"
