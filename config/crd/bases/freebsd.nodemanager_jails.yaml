---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: jails.freebsd.nodemanager
spec:
  group: freebsd.nodemanager
  names:
    kind: Jail
    listKind: JailList
    plural: jails
    singular: jail
  scope: Namespaced
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        description: Jail is the Schema for the jails API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: JailSpec defines the desired state of Jail.
            properties:
              hostname:
                description: Hostname is the jail's internal hostname. Defaults to
                  the resource name.
                type: string
              inet:
                description: Inet is the IPv4 address assigned to the jail (CIDR or
                  bare IP).
                type: string
              inet6:
                description: Inet6 is the IPv6 address assigned to the jail (CIDR
                  or bare IP).
                type: string
              interface:
                description: Interface is the network interface to attach to the jail.
                type: string
              mounts:
                description: |-
                  Mounts defines additional filesystem mounts made available inside the jail
                  via a per-jail fstab file.
                items:
                  description: JailMount describes a single filesystem mount inside
                    the jail.
                  properties:
                    hostPath:
                      description: HostPath is the absolute path on the host to expose
                        inside the jail.
                      type: string
                    jailPath:
                      description: JailPath is the absolute path inside the jail root
                        where HostPath is mounted.
                      type: string
                    readOnly:
                      description: ReadOnly mounts the filesystem read-only.
                      type: boolean
                    type:
                      description: Type is the filesystem type. Defaults to "nullfs".
                      type: string
                  required:
                  - hostPath
                  - jailPath
                  type: object
                type: array
              nodeName:
                description: |-
                  NodeName restricts reconciliation to the nodemanager instance running on
                  the named host. If empty the jail is ignored by all nodes.
                type: string
              release:
                description: Release is the FreeBSD release version to use (e.g. "14.2-RELEASE").
                type: string
              templateRef:
                description: |-
                  TemplateRef is the name of a JailTemplate in the same namespace.
                  When set, the template's defaults are merged under this spec's values
                  (jail-level fields take precedence over template defaults).
                type: string
              update:
                description: Update controls periodic freebsd-update(8) runs for this
                  jail.
                properties:
                  delay:
                    description: Delay is the minimum time between updates (e.g. "24h").
                    type: string
                  group:
                    description: |-
                      Group is a lease group name.  Only one jail in the group will run
                      freebsd-update at a time, preventing concurrent disruption across hosts.
                    type: string
                  schedule:
                    description: Schedule is a cron expression for when updates should
                      run.
                    type: string
                type: object
            required:
            - nodeName
            - release
            type: object
          status:
            description: JailStatus defines the observed state of Jail.
            properties:
              conditions:
                description: |-
                  conditions represent the current state of the Jail resource.

                  Standard condition types:
                    - "Available":   jail is running and healthy.
                    - "Progressing": jail is being provisioned or updated.
                    - "Degraded":    jail failed to reach or maintain desired state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastUpdate:
                description: LastUpdate is the time of the last successful freebsd-update
                  run.
                format: date-time
                type: string
              postCreateDone:
                description: |-
                  PostCreateDone records when postCreate hooks from the referenced
                  JailTemplate completed successfully.
                format: date-time
                type: string
              release:
                description: |-
                  Release is the FreeBSD release string reported by the jail root
                  (from /bin/freebsd-version).  Compare against spec.release to detect
                  when a reprovision has completed or is pending.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
