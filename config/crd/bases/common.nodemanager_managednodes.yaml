---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: managednodes.common.nodemanager
spec:
  group: common.nodemanager
  names:
    kind: ManagedNode
    listKind: ManagedNodeList
    plural: managednodes
    singular: managednode
  scope: Namespaced
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        description: ManagedNode is the Schema for the managednodes API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ManagedNodeSpec defines the desired state of ManagedNode
            properties:
              domain:
                type: string
              upgrade:
                properties:
                  delay:
                    type: string
                  group:
                    description: filter on label, and we can't filter on a field in
                      the spec.
                    type: string
                  schedule:
                    type: string
                type: object
              wireGuard:
                description: |-
                  WireGuardSpec controls optional WireGuard key bootstrapping for this node.
                  When Enabled is true, the controller generates a Curve25519 keypair on first
                  reconcile and stores it in a Secret named wg-<Interface>-<nodeName>.  The
                  public key is published to status.wireGuard so other nodes can build peer
                  configs from template data before the interface is configured.
                properties:
                  enabled:
                    description: Enabled turns on key bootstrapping for this node.
                    type: boolean
                  interface:
                    description: Interface is the WireGuard interface name to bootstrap.  Defaults
                      to wg0.
                    type: string
                type: object
            type: object
          status:
            description: ManagedNodeStatus defines the observed state of ManagedNode
            properties:
              configsets:
                items:
                  description: ConfigSetApplyStatus records the last reconciliation
                    outcome for a ConfigSet on this node.
                  properties:
                    conflicts:
                      description: |-
                        Conflicts lists resources claimed by both this ConfigSet and another matching
                        ConfigSet, e.g. ["file:/etc/nginx/nginx.conf (also in configset \"web-base\")"].
                        When non-empty, this ConfigSet was not applied on this reconcile.
                      items:
                        type: string
                      type: array
                    error:
                      type: string
                    lastApplied:
                      format: date-time
                      type: string
                    name:
                      type: string
                    resourceVersion:
                      type: string
                  required:
                  - name
                  type: object
                type: array
              fileBackups:
                additionalProperties:
                  type: string
                description: |-
                  FileBackups records the SHA256 hash of the content that was on disk
                  immediately before nodemanager last replaced each file.  Use the hash to
                  locate the backup blob in the filebucket store for recovery.
                type: object
              fileHashes:
                additionalProperties:
                  type: string
                description: |-
                  FileHashes records the SHA256 hash of the content last written by
                  nodemanager for each file path.  Used to detect out-of-band modifications
                  when ProtectContent is enabled on a File entry in a ConfigSet.
                type: object
              interfaces:
                additionalProperties:
                  description: NetworkInterface holds the addresses observed on a
                    single network interface.
                  properties:
                    ipv4:
                      items:
                        type: string
                      type: array
                    ipv6:
                      items:
                        type: string
                      type: array
                  type: object
                type: object
              lastFileBucketGC:
                description: |-
                  LastFileBucketGC records when the filebucket GC last ran successfully on
                  this node.  Persisted so the GC interval is honoured across controller
                  restarts and crash loops.
                format: date-time
                type: string
              release:
                type: string
              sshHostKeys:
                items:
                  description: |-
                    SSHHostKey holds the SSHFP record fields for one SSH host key, ready for
                    direct insertion into a DNS zone as an SSHFP record (RFC 4255).
                  properties:
                    algorithm:
                      description: 'Algorithm is the SSHFP algorithm number: 1=RSA,
                        2=DSA, 3=ECDSA, 4=Ed25519.'
                      type: integer
                    fingerprint:
                      description: Fingerprint is the hex-encoded hash of the public
                        key.
                      type: string
                    fingerprintType:
                      description: 'FingerprintType is the SSHFP fingerprint type:
                        1=SHA-1, 2=SHA-256.'
                      type: integer
                  required:
                  - algorithm
                  - fingerprint
                  - fingerprintType
                  type: object
                type: array
              wireGuard:
                items:
                  description: |-
                    WireGuardInterface holds the identity information for a WireGuard interface
                    on this node. Combined with the node's IP addresses from Interfaces, this
                    gives peers everything needed to establish a tunnel.
                  properties:
                    listenPort:
                      description: ListenPort is the UDP port the interface is listening
                        on, if set.
                      type: integer
                    name:
                      description: Name is the network interface name, e.g. wg0.
                      type: string
                    publicKey:
                      description: PublicKey is the base64-encoded Curve25519 public
                        key.
                      type: string
                  required:
                  - name
                  - publicKey
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
