# This rule is not used by the project nodemanager itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the freebsd.nodemanager.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: nodemanager
    app.kubernetes.io/managed-by: kustomize
  name: freebsd-bastillejail-editor-role
rules:
- apiGroups:
  - freebsd.nodemanager
  resources:
  - bastillejails
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - freebsd.nodemanager
  resources:
  - bastillejails/status
  verbs:
  - get
