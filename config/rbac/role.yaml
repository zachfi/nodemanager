---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - common.nodemanager.nodemanager
  resources:
  - configsets
  - managednodes
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - common.nodemanager.nodemanager
  resources:
  - configsets/finalizers
  - managednodes/finalizers
  verbs:
  - update
- apiGroups:
  - common.nodemanager.nodemanager
  resources:
  - configsets/status
  - managednodes/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - freebsd.nodemanager
  resources:
  - poudrieres
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - freebsd.nodemanager
  resources:
  - poudrieres/finalizers
  verbs:
  - update
- apiGroups:
  - freebsd.nodemanager
  resources:
  - poudrieres/status
  verbs:
  - get
  - patch
  - update
